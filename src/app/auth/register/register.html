<div class="register-page">
    <div class="register">
        <div class="text-center">
            <img  src="assets/landing/images/logo-1.jpg" alt="Maskoteka" class="register-logo">
            <h3>Crear cuenta</h3>
            <p>Registra tus datos para gestionar tus mascotas y citas veterinarias</p>
        </div>

        <form>
            <div class="form-group">
                <input class="form-control" placeholder="Nombres completos">
            </div>

            <div class="form-group">
                <input type="email" class="form-control" placeholder="Correo electrónico">
            </div>

            <div class="form-group">
                <input class="form-control" placeholder="Celular">
            </div>

            <div class="form-group">
                <input type="password" class="form-control" placeholder="Contraseña">
            </div>

            <div class="form-group">
                <input type="password" class="form-control" placeholder="Confirmar contraseña">
            </div>

            <div class="checkbox">
                <label><input type="checkbox">Acepto los términos y condiciones</label>
            </div>

            <button class="btn btn-maskoteka btn-block">Crear cuenta</button>
        </form>
        <hr>

        <div class="social">
            <button class="btn google btn-block">
                <i class="fa fa-google"></i>Registrarse con Google
            </button>

            <button class="btn apple btn-block">
                <i class="fa fa-apple"></i>Registrarse con Apple
            </button>

            <button class="btn facebook btn-block">
                <i class="fa fa-facebook"></i> Registrarse con Facebook
            </button>

        </div>

        <div class="text-center register-links">¿Ya tienes cuenta?
            <a routerLink="/login">Iniciar sesión</a>
        </div>
    </div>
</div>
