<div class="login-page">
    <div class="login">
        <div class="text-center">
            <img src="assets/landing/images/logo-1.jpg" class="login-logo" alt="Maskoteka">

            <h3>Maskoteka</h3>
            <p>Inicia sesión para gestionar tus mascotas y citas veterinarias</p>
        </div>

        <form>
            <div class="form-group">
                <input type="email" class="form-control" placeholder="Correo electrónico">
            </div>

            <div class="form-group">
                <input type="password" class="form-control" placeholder="Contraseña">
            </div>

            <button class="btn btn-maskoteka btn-block">
                Iniciar sesión
            </button>
        </form>
        <hr>

        <div class="social">
            <button class="btn google btn-block">
                <i class="fa fa-google"></i> Continuar con Google
            </button>

            <button class="btn apple btn-block">
                <i class="fa fa-apple"></i> Continuar con Apple
            </button>

            <button class="btn facebook btn-block">
                <i class="fa fa-facebook"></i> Continuar con Facebook
            </button>
        </div>

        <div class="text-center login-links">
            <a href="#">¿Olvidaste tu contraseña?</a>
            <br><br>
            <a routerLink="/register">Crear cuenta</a>
        </div>
  </div>
</div>
